<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Case Studies | YSG Media</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/main.css" />
  </head>
  <body>
    <div id="header-mount"></div>

    <main>
      <section style="background: var(--bg-secondary); color: white; padding: var(--spacing-xl) var(--spacing-lg); text-align: center;">
        <h1 style="font-size: 3.5rem; margin-bottom: var(--spacing-sm); color: white;">Results That Matter</h1>
        <p style="color: var(--text-secondary); max-width: 600px; margin: 0 auto; font-size: 1.1rem;">How we've helped businesses achieve massive ROI through data-driven campaigns.</p>
      </section>

      <section style="padding: var(--spacing-xl) var(--spacing-lg); max-width: 1400px; margin: 0 auto;">
        <div id="page-cases-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: var(--spacing-lg);">
          <!-- Injected via JS -->
        </div>
      </section>

      <section style="background: var(--bg-primary); padding: var(--spacing-xl) var(--spacing-lg); max-width: 1400px; margin: 0 auto;">
        <div style="text-align: center; margin-bottom: var(--spacing-lg);">
            <h2 style="font-size: 2.5rem;">What Our Clients Say</h2>
        </div>
        <div id="page-testimonials-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: var(--spacing-md);">
          <!-- Injected via JS -->
        </div>
      </section>
    </main>

    <div id="footer-mount"></div>

    <script type="module" src="/assets/js/page-loader.js"></script>
    <script type="module" src="/assets/js/animation-engine.js"></script>
  </body>
</html>
