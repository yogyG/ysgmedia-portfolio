<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Industries We Work With | YSG Media</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/main.css" />
  </head>
  <body>
    <div id="header-mount"></div>

    <main>
      <section style="background: var(--bg-secondary); color: white; padding: var(--spacing-xl) var(--spacing-lg); text-align: center;">
        <h1 style="font-size: 3.5rem; margin-bottom: var(--spacing-sm); color: white;">Industries We Work With</h1>
        <p style="color: var(--text-secondary); max-width: 600px; margin: 0 auto; font-size: 1.1rem;">From fashion boutiques to B2B SaaS, we tailor data-driven campaigns to your specific market.</p>
      </section>

      <section style="padding: var(--spacing-xl) var(--spacing-lg); max-width: 1000px; margin: 0 auto;">
         <div style="display: flex; flex-wrap: wrap; gap: var(--spacing-md); justify-content: center;">
            <div class="hover-lift reveal-on-scroll" style="padding: var(--spacing-md); text-align: center; background: var(--bg-card); border-radius: var(--border-radius-sm); border: 1px solid var(--border-muted); flex: 1 1 200px;">
               <div style="color: var(--accent-primary); font-size: 2rem; margin-bottom: var(--spacing-xs);">👔</div>
               <div style="font-weight: 600;">Fashion & Boutiques</div>
            </div>
            <div class="hover-lift reveal-on-scroll delay-100" style="padding: var(--spacing-md); text-align: center; background: var(--bg-card); border-radius: var(--border-radius-sm); border: 1px solid var(--border-muted); flex: 1 1 200px;">
               <div style="color: var(--accent-primary); font-size: 2rem; margin-bottom: var(--spacing-xs);">🏭</div>
               <div style="font-weight: 600;">Manufacturers</div>
            </div>
            <div class="hover-lift reveal-on-scroll delay-200" style="padding: var(--spacing-md); text-align: center; background: var(--bg-card); border-radius: var(--border-radius-sm); border: 1px solid var(--border-muted); flex: 1 1 200px;">
               <div style="color: var(--accent-primary); font-size: 2rem; margin-bottom: var(--spacing-xs);">☕</div>
               <div style="font-weight: 600;">Restaurants & Cafes</div>
            </div>
            <div class="hover-lift reveal-on-scroll delay-300" style="padding: var(--spacing-md); text-align: center; background: var(--bg-card); border-radius: var(--border-radius-sm); border: 1px solid var(--border-muted); flex: 1 1 200px;">
               <div style="color: var(--accent-primary); font-size: 2rem; margin-bottom: var(--spacing-xs);">🏢</div>
               <div style="font-weight: 600;">Real Estate</div>
            </div>
            <div class="hover-lift reveal-on-scroll delay-400" style="padding: var(--spacing-md); text-align: center; background: var(--bg-card); border-radius: var(--border-radius-sm); border: 1px solid var(--border-muted); flex: 1 1 200px;">
               <div style="color: var(--accent-primary); font-size: 2rem; margin-bottom: var(--spacing-xs);">🏥</div>
               <div style="font-weight: 600;">Doctors & Clinics</div>
            </div>
            <div class="hover-lift reveal-on-scroll delay-100" style="padding: var(--spacing-md); text-align: center; background: var(--bg-card); border-radius: var(--border-radius-sm); border: 1px solid var(--border-muted); flex: 1 1 200px;">
               <div style="color: var(--accent-primary); font-size: 2rem; margin-bottom: var(--spacing-xs);">🎓</div>
               <div style="font-weight: 600;">Coaching Institutes</div>
            </div>
         </div>
      </section>

    </main>

    <div id="footer-mount"></div>

    <script type="module" src="assets/js/page-loader.js"></script>
    <script type="module" src="assets/js/animation-engine.js"></script>
  </body>
</html>
